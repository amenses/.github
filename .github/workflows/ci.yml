name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect project type
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.detect.outputs.has-node }}
      has-python: ${{ steps.detect.outputs.has-python }}
      has-go: ${{ steps.detect.outputs.has-go }}
      has-rust: ${{ steps.detect.outputs.has-rust }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect languages and package managers
        id: detect
        run: |
          echo "has-node=$([ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has-python=$([ -f requirements.txt ] || [ -f pyproject.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has-go=$([ -f go.mod ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has-rust=$([ -f Cargo.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has-node == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Run lint
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script defined — skipping"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: detect
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: node
            enabled: ${{ needs.detect.outputs.has-node }}
            setup: node
          - id: python
            enabled: ${{ needs.detect.outputs.has-python }}
            setup: python
          - id: go
            enabled: ${{ needs.detect.outputs.has-go }}
            setup: go
          - id: rust
            enabled: ${{ needs.detect.outputs.has-rust }}
            setup: rust
    steps:
      - uses: actions/checkout@v4

      - name: Skip if project type not detected
        if: matrix.enabled != 'true'
        run: echo "No ${{ matrix.id }} project detected — skipping"

      - name: Set up Node.js
        if: matrix.setup == 'node' && matrix.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        if: matrix.setup == 'python' && matrix.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Go
        if: matrix.setup == 'go' && matrix.enabled == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Set up Rust
        if: matrix.setup == 'rust' && matrix.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run Node.js tests
        if: matrix.setup == 'node' && matrix.enabled == 'true'
        run: |
          npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          if npm run | grep -q " test"; then
            npm test
          else
            echo "No test script defined — skipping"
          fi

      - name: Run Python tests
        if: matrix.setup == 'python' && matrix.enabled == 'true'
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || true
          if [ -f pyproject.toml ] && python -m pytest --version >/dev/null 2>&1; then
            python -m pytest
          else
            echo "No Python test runner configured — skipping"
          fi

      - name: Run Go tests
        if: matrix.setup == 'go' && matrix.enabled == 'true'
        run: go test ./...

      - name: Run Rust tests
        if: matrix.setup == 'rust' && matrix.enabled == 'true'
        run: cargo test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect, lint, test]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: needs.detect.outputs.has-node == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Build Node.js project
        if: needs.detect.outputs.has-node == 'true'
        run: |
          npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          if npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script defined — skipping"
          fi

      - name: Set up Go
        if: needs.detect.outputs.has-go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Go project
        if: needs.detect.outputs.has-go == 'true'
        run: go build ./...

      - name: Set up Rust
        if: needs.detect.outputs.has-rust == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust project
        if: needs.detect.outputs.has-rust == 'true'
        run: cargo build --release

      - name: No build target detected
        if: needs.detect.outputs.has-node != 'true' && needs.detect.outputs.has-go != 'true' && needs.detect.outputs.has-rust != 'true'
        run: echo "No build target detected — CI validation complete"
