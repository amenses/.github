name: Development Task
description: Track engineering work, refactors, chores, or technical debt
title: "[Task]: "
labels: ["task", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for engineering tasks that are not bugs or feature requests.

  - type: input
    id: repository
    attributes:
      label: Repository
      description: Which repository is this task for?
      placeholder: e.g., infra-terraform
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Task Type
      options:
        - Refactor
        - Technical debt
        - Infrastructure
        - Testing
        - CI/CD
        - Dependency update
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this task needed?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
    validations:
      required: false

  - type: input
    id: estimate
    attributes:
      label: Estimate
      description: Rough effort estimate (e.g., 2 days, 1 sprint)
      placeholder: e.g., 3 days
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / Blockers
      description: Related issues, PRs, or external dependencies
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Definition of Done
      options:
        - label: Code changes merged
          required: false
        - label: Tests added or updated
          required: false
        - label: Documentation updated
          required: false
        - label: CI passing
          required: false
